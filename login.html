<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconoWeb - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/geral.css">
    <link rel="stylesheet" href="css/modules/login.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/bd/supabase.js"></script>
    <script src="js/auth/auth.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="grid-overlay"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo EconoWeb -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <img src="assets/images/econoweb_logo.png" alt="EconoWeb" class="logo-img" onerror="this.style.display='none'">
                    <div class="tagline">Intranet Corporativa</div>
                </div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Usuário</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="username"
                            class="form-input"
                            placeholder="Digite seu usuário"
                            autocomplete="username"
                            required
                        >
                        <i class="fas fa-user input-icon"></i>
                    </div>
                    <div class="error-message" id="username-error">Usuário não encontrado</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Digite sua senha"
                            autocomplete="current-password"
                            required
                        >
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="error-message" id="password-error">Senha incorreta</div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="link link-primary" style="font-size: 13px;" onclick="alert('Contate o administrador do sistema para recuperar acesso.')">
                        Esqueci a senha
                    </a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-arrow-right"></i> Entrar na Intranet
                </button>
            </form>

            <!-- Security Badge -->
            <div class="security-badge">
                <i class="fas fa-shield-halved"></i>
                <span>Acesso restrito - Autenticação obrigatória</span>
            </div>
        </div>
    </div>

    <script src="js/auth/login/login.js"></script>
</body>
</html>
